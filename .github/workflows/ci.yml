name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test-build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20.x, 22.x]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

            - name: Build library
              run: npm run build

            - name: Build example app
              run: |
                  cd apps/nextjs-example
                  npm ci
                  npm run build
